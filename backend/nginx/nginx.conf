upstream vitip_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;          # Replace with your domain name

    # Large uploads for video files
    client_max_body_size 500M;

    # Proxy API requests
    location /api/ {
        proxy_pass         http://vitip_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeouts for video processing (up to 10 min)
        proxy_read_timeout    600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://vitip_api;
    }

    # Serve processed static files directly via Nginx (faster than FastAPI)
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # OpenAPI docs
    location /docs {
        proxy_pass http://vitip_api;
    }

    location /openapi.json {
        proxy_pass http://vitip_api;
    }
}
